name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run full local gate
        run: python -B scripts/run_all.py

      - name: Run validation references
        run: python -B validation/run_validation.py

      - name: Run Python validation references
        run: python -B validation/run_python_validation.py

      - name: Run regression tests directly
        run: python -B tests/test_regressions.py

      - name: Run JSON diagnostic tests
        run: python -B tests/test_json_diagnostics.py

      - name: Run prelint tests
        run: python -B tests/test_prelint_ai_syntax_errors.py

      - name: Run list operation tests
        run: python -B tests/test_list_operations.py

      - name: Run pytest
        run: python -m pytest -q

      - name: Check example through module CLI
        run: python -B -m transpiler.aether.cli check examples/01_safe_divide.aeth

      - name: Check example through console script
        run: aether check examples/01_safe_divide.aeth

      - name: Run parser fuzz smoke test
        run: python -B scripts/fuzz_parser.py --rounds 200 --mode all
